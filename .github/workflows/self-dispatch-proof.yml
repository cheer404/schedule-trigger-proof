name: Timed self-dispatch proof

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  release-and-dispatch:
    environment: one-minute-chain
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Dispatch the next workflow after timer release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run chain-receiver.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$GITHUB_REF_NAME"
          echo "CHAIN_DISPATCH_REQUEST_OK $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
