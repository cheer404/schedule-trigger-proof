name: Daily prequeued runner

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Probe validates the runner without contacting the target service
        required: true
        default: probe
        type: choice
        options:
          - probe
          - entrypoint-probe
          - production
      target_utc:
        description: Production target time in ISO-8601 UTC
        required: false
        type: string
      wait_environment:
        description: Environment that holds this run before execution
        required: true
        default: daily-queue
        type: choice
        options:
          - one-minute-chain
          - bootstrap
          - daily-queue

permissions: {}

jobs:
  release-and-arm-next-day:
    environment: ${{ inputs.wait_environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      actions: write
    steps:
      - name: Probe timer release
        if: ${{ inputs.mode != 'production' }}
        run: echo "PRODUCTION_TIMER_PROBE_OK $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Wait for target and prequeue tomorrow
        if: ${{ inputs.mode == 'production' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_UTC: ${{ inputs.target_utc }}
        run: |
          set -euo pipefail
          test -n "$TARGET_UTC"

          target_epoch="$(date -u -d "$TARGET_UTC" +%s)"
          now_epoch="$(date -u +%s)"
          if (( now_epoch > target_epoch + 3600 )); then
            echo "::error::Target time expired by more than one hour."
            exit 1
          fi
          if (( now_epoch < target_epoch )); then
            sleep "$((target_epoch - now_epoch))"
          fi

          next_target="$(date -u -d "$TARGET_UTC + 1 day" +'%Y-%m-%dT%H:%M:%SZ')"
          gh workflow run daily-prequeued.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$GITHUB_REF_NAME" \
            -f mode=production \
            -f target_utc="$next_target" \
            -f wait_environment=daily-queue
          echo "NEXT_DAY_PREQUEUED target=$next_target"

  run-private-application:
    needs: release-and-arm-next-day
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions: {}
    env:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Restore private application bundle
        shell: bash
        env:
          APP_BUNDLE_B64: ${{ secrets.APP_BUNDLE_B64 }}
        run: |
          set -euo pipefail
          test -n "$APP_BUNDLE_B64"
          install -d -m 700 "$RUNNER_TEMP/private-app"
          printf '%s' "$APP_BUNDLE_B64" | base64 --decode > "$RUNNER_TEMP/app.tar.gz"
          tar -xzf "$RUNNER_TEMP/app.tar.gz" -C "$RUNNER_TEMP/private-app"
          test -f "$RUNNER_TEMP/private-app/main.py"
          test -f "$RUNNER_TEMP/private-app/requirements.txt"

      - name: Install dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          -r "$RUNNER_TEMP/private-app/requirements.txt"

      - name: Validate private configuration
        shell: bash
        env:
          AHUT_USERS_JSON: ${{ secrets.AHUT_USERS_JSON }}
          AHUT_SHARED_STUDENT_IDS_JSON: ${{ secrets.AHUT_SHARED_STUDENT_IDS_JSON }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os

          def normalize_student_id(value):
              assert not isinstance(value, bool)
              if isinstance(value, int):
                  student_id = value
              elif isinstance(value, str) and value.strip().isdigit():
                  student_id = int(value.strip())
              else:
                  raise AssertionError
              assert student_id > 0
              return student_id

          users = json.loads(os.environ["AHUT_USERS_JSON"])
          extra_ids = json.loads(os.environ["AHUT_SHARED_STUDENT_IDS_JSON"])

          assert isinstance(users, list) and users
          assert isinstance(extra_ids, list) and extra_ids
          assert all(isinstance(user, dict) for user in users)
          assert all(
              isinstance(user.get("password"), str) and user["password"]
              for user in users
          )

          student_ids = [
              normalize_student_id(user.get("student_id")) for user in users
          ]
          student_ids.extend(normalize_student_id(value) for value in extra_ids)
          assert len(student_ids) == 2
          assert len(set(student_ids)) == 2
          PY

      - name: Probe application bundle
        if: ${{ inputs.mode == 'probe' }}
        shell: bash
        run: |
          python -m py_compile "$RUNNER_TEMP/private-app/main.py"
          echo "PRIVATE_BUNDLE_PROBE_OK"

      - name: Run main.py and verify both users are outside sign-in time
        if: ${{ inputs.mode == 'entrypoint-probe' }}
        shell: bash
        env:
          AHUT_USERS_JSON: ${{ secrets.AHUT_USERS_JSON }}
          AHUT_SHARED_STUDENT_IDS_JSON: ${{ secrets.AHUT_SHARED_STUDENT_IDS_JSON }}
        run: |
          set -euo pipefail
          beijing_time="$(TZ=Asia/Shanghai date +'%H:%M:%S')"
          if [[ "$beijing_time" > "21:19:59" ]]; then
            echo "::error::Safety check refused to run during the sign-in window."
            exit 1
          fi

          private_log="$RUNNER_TEMP/entrypoint-probe.log"
          trap 'rm -f -- "$private_log"' EXIT
          cd "$RUNNER_TEMP/private-app"

          set +e
          python main.py >"$private_log" 2>&1
          exit_code=$?
          set -e

          if (( exit_code != 1 )); then
            echo "::error::main.py returned an unexpected exit code."
            exit 1
          fi

          PRIVATE_LOG="$private_log" python - <<'PY'
          import os
          from pathlib import Path

          output = Path(os.environ["PRIVATE_LOG"]).read_text(
              encoding="utf-8",
              errors="replace",
          )
          assert "本次为 2 人尝试进行签到，成功人数：0" in output
          assert output.count("未到签到时间") >= 2
          assert "获取token" not in output
          PY

          echo "MAIN_PY_EXECUTED=true"
          echo "MAIN_PY_CONFIGURED_USERS=2"
          echo "MAIN_PY_EXIT_CODE=$exit_code"
          echo "MAIN_PY_RESULT=两名用户均未到签到时间"

      - name: Run private application without public personal logs
        if: ${{ inputs.mode == 'production' }}
        shell: bash
        env:
          AHUT_USERS_JSON: ${{ secrets.AHUT_USERS_JSON }}
          AHUT_SHARED_STUDENT_IDS_JSON: ${{ secrets.AHUT_SHARED_STUDENT_IDS_JSON }}
        run: |
          set -euo pipefail
          private_log="$RUNNER_TEMP/private-app.log"
          trap 'rm -f -- "$private_log"' EXIT
          cd "$RUNNER_TEMP/private-app"

          if python main.py >"$private_log" 2>&1; then
            echo "PRIVATE_APPLICATION_COMPLETED_OK"
            exit 0
          fi

          echo "::warning::First attempt failed; retrying in ten minutes."
          sleep 600
          if python main.py >"$private_log" 2>&1; then
            echo "PRIVATE_APPLICATION_RETRY_COMPLETED_OK"
          else
            echo "::error::Private application failed twice; personal output is intentionally withheld."
            exit 1
          fi
