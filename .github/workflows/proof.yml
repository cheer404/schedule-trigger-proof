name: Public schedule delivery proof

on:
  schedule:
    # Temporary UTC test points on 2026-07-20.
    - cron: "41 15 20 7 *"
    - cron: "46 15 20 7 *"
    - cron: "51 15 20 7 *"
    - cron: "56 15 20 7 *"

permissions: {}

jobs:
  prove-schedule-event:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Prove scheduled delivery
        shell: bash
        run: |
          test "${{ github.event_name }}" = "schedule"
          echo "PUBLIC_SCHEDULE_TRIGGER_OK $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
