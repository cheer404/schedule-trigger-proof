name: Two-minute queued timer proof

on:
  workflow_dispatch:

permissions: {}

jobs:
  prove-timer-release:
    environment: two-minute-proof
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Prove automatic timer release
        shell: bash
        run: |
          test "${{ github.event_name }}" = "workflow_dispatch"
          echo "QUEUED_TIMER_TRIGGER_OK $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
